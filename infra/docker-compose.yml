version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stockai
      POSTGRES_PASSWORD: stockai_password
      POSTGRES_DB: stockai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stockai -d stockai_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://stockai:stockai_password@postgres:5432/stockai_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../logs:/app/logs
    command: uvicorn app.server:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
